<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../assets/images/icon.png">
    <link rel="stylesheet" type="text/css" href="../assets/css/global.css">
    <title>Pedra da Glória - Me Conte uma História</title>
</head>

<body>
    <div class="story-container">
        <button class="back-to-map-button" onclick="window.location.href = '../index.html'"
            title="Voltar ao mapa"></button>

        <img id="scene-image" class="scene-image" src="" alt="Cenário">

        <div class="dialog-box">
            <img class="dialog-balloon" src="../assets/images/dialog-balloon.png" alt="Balão de Diálogo">
            <p id="dialog-text" class="dialog-text"></p>
            <button id="next-dialog-button" class="next-dialog-button" title="Avançar diálogo"></button>
        </div>
    </div>

    <script src="../assets/js/story.js"></script>
    <script>
        const STORY_SCENES = [
            { text: "AEEEEEEEEE EEEEEEEEE!!", image: "gloria-scene-01.png", style: "shout" },
            { text: "Qual é, moleque? Estou assistindo ao ritual, você está me atrapalhando...", image: "gloria-scene-02.png" },
            { text: "QUÊ? Você quer ouvir um conto antigo?", image: "gloria-scene-04.png" },
            { text: "Eu sou ótima nisso! Meu avô me contou tudo o que ele conhece,", image: "gloria-scene-05.png" },
            { text: "e aquele velho é bem sabido, só que meio bravo às vezes.", image: "gloria-scene-03.png" },
            { text: "Então deixa eu começar por partes...", image: "gloria-scene-06.png" },
            { text: "Aqui na cachoeira sempre foi um lugar sagrado; era onde os indígenas interagiam com a natureza.", image: "gloria-scene-07.png" },
            { text: "Eles iam à Pedra da Glória para cerimônias místicas, que também era ponto de encontro de cangaceiros.", image: "gloria-scene-07.png" },
            { text: "Mas diziam que, em cima da Pedra, surgia uma índia linda que estava vinculada ao interior oco da rocha.", image: "gloria-scene-08.png" },
            { text: "Dizem que o canto da Glória, somado à sua beleza, atraía os homens, que acabavam desaparecidos.", image: "gloria-scene-09.png" },
            { text: "As pessoas, quando atraídas para dentro da rocha, eram deixadas presas e acabavam morrendo de fome.", image: "gloria-scene-15.png" },
            { text: "Mas, se conseguissem escapar, iriam encontrar uma caverna com reinos e tesouros só para si.", image: "gloria-scene-11.png" },
            { text: "Diz a lenda que, quando a cachoeira está cheia e se escuta um grito saindo da pedra, é sinal de que alguém morrerá.", image: "gloria-scene-12.png" },
            { text: "Legal, né?", image: "gloria-scene-13.png" },
            { text: "Então tome cuidado, porque meu avô tinha muitos amigos que foram enganados pelo canto da índia.", image: "gloria-scene-14.png" },
            { text: "Chega de história e vem curtir o ritual conosco!", image: "gloria-scene-06.png" }
        ];

        initStory(STORY_SCENES);
    </script>
</body>

</html>
