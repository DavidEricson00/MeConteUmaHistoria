<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="../assets/css/global.css">
    <title>Papa-Figo - Tell me a Story</title>
</head>

<body>
    <div class="story-container">
        <!-- Back to map button -->
        <button class="btn-map" onclick="window.location.href = '../index.html'" title="Voltar ao mapa"></button>

        <!-- Scene Background Image -->
        <img id="scene-img" class="scene-image" src="" alt="Cenário">

        <!-- Dialog Box -->
        <div class="dialog-box">
            <img class="dialog-balloon" src="../assets/images/chat.png" alt="Balão de Diálogo">
            <p id="dialog-text" class="dialog-text"></p>
            <button id="btn-next" class="btn-next" title="Avançar diálogo"></button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../assets/js/story.js"></script>
    <script>
        const storyData = [
            { text: "*TOC TOC*", image: "1.png", speaker: "salada" },
            { text: "...", image: "b.png", speaker: "salada" },
            { text: "Ah, olá! O que faz aqui?", image: "3.png", speaker: "salada" },
            { text: "Você quer que eu conte uma história?", image: "4.png", speaker: "salada" },
            { text: "Hum, ok, tudo bem.", image: "4.png", speaker: "salada" },
            { text: "Acho que consigo lembrar de uma ou outra que me contavam nos tempos em que eu era moça...", image: "5.png", speaker: "ebaa" },
            { text: "Eu vivia em uma vila no interior de Pernambuco.", image: "6.png", speaker: "ebaa" },
            { text: "O dia todinho eu e minha irmã trabalhávamos na roça, assim a gente podia brincar de noite.", image: "7.png", speaker: "ebaa" },
            { text: "Mas, sempre que eu saía à noite e voltava muito tarde, meus pais brigavam...", image: "8.png", speaker: "ebaa" },
            { text: "pois eles diziam que um tal de Papa-Figo poderia pegar a gente.", image: "8.png", speaker: "ebaa" },
            { text: "Eu, por ser criança, achava que isso era besteira...", image: "9.png", speaker: "ebaa" },
            { text: "pensei: 'Como pode existir um velho que sai sequestrando crianças e comendo o fígado delas?'", image: "9.png", speaker: "ebaa" },
            { text: "Isso deve ser mentira dos meus pais para que eu acorde mais cedo e tenha de varrer o terreiro junto com minha mãe.", image: "9.png", speaker: "ebaa" },
            { text: "Porém, meu filho, aqui vai uma dica para você:", image: "29.png", speaker: "ebaa" },
            { text: "nunca duvide dos mais velhos...", image: "10.png", speaker: "ebaa" },
            { text: "Era por volta de nove e meia da noite...", image: "11.png", speaker: "ebaa" },
            { text: "eu e minha irmã estávamos sozinhas na rua brincando de bila.", image: "11.png", speaker: "ebaa" },
            { text: "Como era tarde, todos os nossos amigos já tinham ido para casa;", image: "11.png", speaker: "ebaa" },
            { text: "nós já íamos embora, estávamos apenas jogando uma última partida quando, de repente...", image: "11.png", speaker: "ebaa" },
            { text: "...apareceu um velho.", image: "12.png", speaker: "ebaa" },
            { text: "Ele tinha um semblante misterioso e, por algum motivo, estava segurando um saco.", image: "12.png", speaker: "ebaa" },
            { text: "Com uma voz grossa, ele começou a dizer:", image: "12.png", speaker: "ebaa" },
            { text: "\"Olá, crianças. Vocês querem uma bala?\"", image: "13.png", speaker: "ebaa" },
            { text: "Respondemos que sim. Ele continuou:", image: "14.png", speaker: "ebaa" },
            { text: "\"Em troca de um favor, darei balas para vocês, crianças...\"", image: "13.png", speaker: "ebaa" },
            { text: "\"Que tipo de favor, senhor?\"", image: "16.png", speaker: "ebaa" },
            { text: "\"Eu vim aqui para visitar um compadre meu, que mora nesta região, e me adiantei para me confessar com o padre.\"", image: "15.png", speaker: "ebaa" },
            { text: "\"A essa hora?\", perguntou minha irmã.", image: "14.png", speaker: "ebaa" },
            { text: "\"Sim, pequena. Mas infelizmente não conheço muito esta região e não sei onde fica a capela daqui. Podem me levar até lá?\"", image: "20.png", speaker: "ebaa" },
            { text: "\"Posso sim!\", disse minha irmã.", image: "21.png", speaker: "ebaa" },
            { text: "\"Deixa eu só catar as bilas aqui do chão que vamos com o senhor.\"", image: "21.png", speaker: "ebaa" },
            { text: "E então o pior aconteceu...", image: "10.png", speaker: "ebaa" },
            { text: "Quando estávamos na frente da capela...", image: "10.png", speaker: "ebaa" },
            { text: "...o velho nocauteou minha irmã com um pedaço de pau.", image: "25.png", speaker: "ebaa" },
            { text: "E depois me atacou também, acertando apenas meu braço.", image: "26.png", speaker: "ebaa" },
            { text: "Corri chamando ajuda na capela,", image: "27.png", speaker: "ebaa" },
            { text: "mas, quando voltei, a minha irmãzinha não estava mais lá...", image: "28.png", speaker: "ebaa" },
            { text: "Eu fico muito triste quando lembro disso...", image: "29.png", speaker: "ebaa" },
            { text: "e é por isso que eu digo e repito:", image: "30.png", speaker: "ebaa" },
            { text: "nunca duvide dos mais velhos, pois eles sempre têm razão.", image: "30.png", speaker: "ebaa" },
            { text: "Fim...", image: "10.png", speaker: "salada" }
        ];

        // Start the story engine
        initStory(storyData);
    </script>
</body>

</html>
